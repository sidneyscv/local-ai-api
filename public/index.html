<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI API - Interface Gráfica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Local AI Agent</h1>
        <p>Interface gráfica para o agente autônomo de IA local</p>

        <div class="section">
            <h2>Criar Workspace</h2>
            <input type="text" id="workspaceName" placeholder="Nome do workspace">
            <button onclick="createWorkspace()">Criar Workspace</button>
            <div id="workspaceResult"></div>
        </div>

        <div class="section">
            <h2>Executar Agente</h2>
            <select id="workspaceSelect">
                <option value="">Selecione um workspace</option>
            </select>
            <textarea id="instruction" placeholder="Digite sua instrução para o agente..." rows="4"></textarea>
            <button onclick="runAgent()">Executar Agente</button>
            <div id="agentResult"></div>
        </div>

        <div class="section">
            <h2>Arquivos do Workspace</h2>
            <button onclick="listFiles()">Listar Arquivos</button>
            <div id="filesList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
